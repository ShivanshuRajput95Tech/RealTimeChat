<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="QuickChat - AI-native real-time communication platform with workspaces, channels, groups, voice/video calls, and smart AI features" />
    <meta name="theme-color" content="#09090b" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QuickChat" />
    
    <meta property="og:title" content="QuickChat - AI-Native Communication" />
    <meta property="og:description" content="Real-time messaging with AI-powered features, workspaces, and groups" />
    <meta property="og:type" content="website" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QuickChat - AI-Native Communication" />
    <meta name="twitter:description" content="Real-time messaging with AI-powered features" />
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>QuickChat - AI-Native Communication Platform</title>
    
    <style>
      .loading-screen {
        position: fixed;
        inset: 0;
        background: #09090b;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-ring {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        position: relative;
      }
      .loader-ring::before,
      .loader-ring::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
      }
      .loader-ring::before {
        border-top-color: #6366f1;
        animation: spin 0.8s linear infinite;
      }
      .loader-ring::after {
        border-bottom-color: #a855f7;
        animation: spin 0.8s linear infinite reverse;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loader-text {
        color: #71717a;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 12px;
        margin-top: 16px;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen" id="loading" style="flex-direction:column">
        <div class="loader-ring"></div>
        <div class="loader-text">Loading QuickChat...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const el = document.getElementById('loading');
          if (el) el.classList.add('hidden');
        }, 800);
      });
    </script>
  </body>
</html>
