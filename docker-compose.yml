version: '3.8'

services:
  mongodb:
    image: mongo:6-alpine
    container_name: realtimechat-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: realtimechat
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtimechat-net

  redis:
    image: redis:7-alpine
    container_name: realtimechat-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtimechat-net

  backend:
    build:
      context: ./QuickChat-Full-Stack/server
      dockerfile: Dockerfile
    container_name: realtimechat-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/realtimechat?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      FRONTEND_URL: http://localhost:5173
      REDIS_URL: redis://:redis123@redis:6379
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./QuickChat-Full-Stack/server:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - realtimechat-net
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    container_name: realtimechat-web
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://localhost:5000
    volumes:
      - ./QuickChat-Full-Stack/client:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - realtimechat-net
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  realtimechat-net:
    driver: bridge
